apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexa-scheduler
  namespace: nexa-system
  labels:
    app.kubernetes.io/name: nexa-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexa-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexa-scheduler
    spec:
      serviceAccountName: nexa-scheduler
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: scheduler
          image: nexascheduler/nexa-scheduler:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/nexa-scheduler/scheduler-config.yaml
            - --authorization-always-allow-paths=/metrics,/healthz,/readyz,/livez
          ports:
            - name: https
              containerPort: 10259
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: scheduler-config
              mountPath: /etc/nexa-scheduler
              readOnly: true
      volumes:
        - name: scheduler-config
          configMap:
            name: nexa-scheduler-config
