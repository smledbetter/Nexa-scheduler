{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nexa-node-controller.fullname" . }}
  labels:
    {{- include "nexa-node-controller.labels" . | nindent 4 }}
rules:
  # --- Node label management (patch only, no delete/create) ---
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  # --- Pod lifecycle monitoring ---
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # --- Events for controller status ---
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # --- Leader election ---
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "get", "update"]
{{- end }}
