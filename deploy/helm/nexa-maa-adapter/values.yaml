# Nexa Azure MAA Adapter Helm Values

# -- Number of adapter replicas.
replicaCount: 1

image:
  # -- Container image repository.
  repository: nexascheduler/nexa-maa-adapter
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart appVersion.
  tag: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override the release name.
nameOverride: ""
# -- Override the full release name.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount for the adapter.
  create: true
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- Name override. Defaults to the fullname template.
  name: ""

rbac:
  # -- Create ClusterRole and ClusterRoleBinding.
  create: true

# -- Pod annotations.
podAnnotations: {}

# -- Pod security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- Container security context.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Container resource requests and limits.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# -- Node selector for adapter pod placement.
nodeSelector: {}

# -- Tolerations for adapter pod placement.
tolerations: []

# -- Affinity rules for adapter pod placement.
affinity: {}

# Adapter settings
adapter:
  # -- Azure MAA endpoint URL (required).
  maaEndpoint: ""
  # -- Port where evidence agents listen on each node.
  evidencePort: 9443
  # -- HTTP port for the verify endpoint.
  port: 8080
  # -- HTTP port for health and metrics.
  metricsPort: 9090
