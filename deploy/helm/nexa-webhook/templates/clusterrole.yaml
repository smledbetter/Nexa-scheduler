{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nexa-webhook.fullname" . }}
  labels:
    {{- include "nexa-webhook.labels" . | nindent 4 }}
rules:
  # --- Events for webhook audit trail ---
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
