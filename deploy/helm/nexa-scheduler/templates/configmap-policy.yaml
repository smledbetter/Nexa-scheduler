apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexa-scheduler.fullname" . }}-policy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexa-scheduler.labels" . | nindent 4 }}
data:
  policy.json: |
    {
      "regionPolicy": {
        "enabled": {{ .Values.policy.region.enabled }},
        "defaultRegion": {{ .Values.policy.region.defaultRegion | quote }},
        "defaultZone": {{ .Values.policy.region.defaultZone | quote }}
      },
      "privacyPolicy": {
        "enabled": {{ .Values.policy.privacy.enabled }},
        "defaultPrivacy": {{ .Values.policy.privacy.defaultPrivacy | quote }},
        "strictOrgIsolation": {{ .Values.policy.privacy.strictOrgIsolation }}
      }
    }
