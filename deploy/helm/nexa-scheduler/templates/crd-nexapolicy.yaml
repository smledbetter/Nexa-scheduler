{{- if .Values.crd.install -}}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nexapolicies.nexa.io
  labels:
    {{- include "nexa-scheduler.labels" . | nindent 4 }}
spec:
  group: nexa.io
  names:
    kind: NexaPolicy
    listKind: NexaPolicyList
    plural: nexapolicies
    singular: nexapolicy
    shortNames:
      - np
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                regionPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    defaultRegion:
                      type: string
                    defaultZone:
                      type: string
                privacyPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    defaultPrivacy:
                      type: string
                      enum:
                        - ""
                        - standard
                        - high
                    strictOrgIsolation:
                      type: boolean
      additionalPrinterColumns:
        - name: Region
          type: boolean
          jsonPath: .spec.regionPolicy.enabled
        - name: Privacy
          type: boolean
          jsonPath: .spec.privacyPolicy.enabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
