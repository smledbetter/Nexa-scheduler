apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexa-scheduler.fullname" . }}-scheduler-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexa-scheduler.labels" . | nindent 4 }}
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: {{ .Values.scheduler.leaderElect }}
    profiles:
      - schedulerName: nexa-scheduler
        plugins:
          filter:
            enabled:
              - name: NexaRegion
              - name: NexaPrivacy
          preFilter:
            enabled:
              - name: NexaAudit
          score:
            enabled:
              - name: NexaRegion
                weight: 50
              - name: NexaPrivacy
                weight: 50
          postFilter:
            enabled:
              - name: NexaAudit
          postBind:
            enabled:
              - name: NexaAudit
