apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nexa-evidence-agent.fullname" . }}
  labels:
    {{- include "nexa-evidence-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nexa-evidence-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nexa-evidence-agent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nexa-evidence-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: evidence-agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port={{ .Values.agent.port }}
            - --report-path={{ .Values.agent.reportPath }}
            - --v=2
          ports:
            - name: http
              containerPort: {{ .Values.agent.port }}
              hostPort: {{ .Values.agent.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
          volumeMounts:
            - name: sev-guest
              mountPath: {{ .Values.agent.reportPath }}
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: sev-guest
          hostPath:
            path: {{ .Values.agent.reportPath }}
            type: {{ .Values.agent.hostPathType | default "CharDevice" }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
